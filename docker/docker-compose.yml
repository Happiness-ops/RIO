version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# RIO AI — Local Development Stack
#
# Services:
#   postgres   — PostgreSQL 16 (persisted in a named volume)
#   redis      — Redis 7 (persisted in a named volume)
#   api        — NestJS API (hot-reload via ts-node-dev, port 3000)
#   workers    — BullMQ worker process (hot-reload, no port)
#   web        — Vite SPA (port 5173)
#
# Usage:
#   docker compose up              — start everything
#   docker compose up api workers  — start backend only
#   docker compose logs -f api     — tail api logs
#   docker compose down -v         — destroy all containers + volumes
# ─────────────────────────────────────────────────────────────────────────────

x-api-env: &api-env
  NODE_ENV:              development
  DATABASE_URL:          postgresql://rio:rio_dev_pass@postgres:5432/rio_dev
  REDIS_URL:             redis://redis:6379
  AUTH_PROVIDER:         ${AUTH_PROVIDER:-firebase}
  FIREBASE_PROJECT_ID:   ${FIREBASE_PROJECT_ID}
  FIREBASE_PRIVATE_KEY:  ${FIREBASE_PRIVATE_KEY}
  FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
  AUTH0_DOMAIN:          ${AUTH0_DOMAIN}
  AUTH0_AUDIENCE:        ${AUTH0_AUDIENCE}
  GEMINI_API_KEY:        ${GEMINI_API_KEY}
  VAPID_PUBLIC_KEY:      ${VAPID_PUBLIC_KEY}
  VAPID_PRIVATE_KEY:     ${VAPID_PRIVATE_KEY}
  VAPID_EMAIL:           ${VAPID_EMAIL}
  CORS_ORIGINS:          http://localhost:5173
  PORT:                  3000

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     rio
      POSTGRES_PASSWORD: rio_dev_pass
      POSTGRES_DB:       rio_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ['CMD-SHELL', 'pg_isready -U rio -d rio_dev']
      interval: 5s
      timeout:  3s
      retries:  10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout:  3s
      retries:  10

  # ── Backend API ─────────────────────────────────────────────────────────────
  api:
    build:
      context:    ..
      dockerfile: docker/api.Dockerfile
      target:     build                   # Use build stage for dev (includes devDeps + ts-node)
    restart: unless-stopped
    environment:
      <<: *api-env
    ports:
      - '3000:3000'
    volumes:
      # Mount source so file changes trigger hot reload
      - ../apps/api/src:/app/apps/api/src:ro
      - ../packages/shared-types/src:/app/packages/shared-types/src:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npx ts-node-dev --respawn --transpile-only -r tsconfig-paths/register src/main.ts
      "
    healthcheck:
      test:         ['CMD-SHELL', 'wget -qO- http://localhost:3000/v1/health || exit 1']
      interval:     15s
      timeout:      5s
      start_period: 30s
      retries:      3

  # ── BullMQ Workers ──────────────────────────────────────────────────────────
  workers:
    build:
      context:    ..
      dockerfile: docker/workers.Dockerfile
      target:     build
    restart: unless-stopped
    environment:
      <<: *api-env
    volumes:
      - ../apps/api/src:/app/apps/api/src:ro
      - ../packages/shared-types/src:/app/packages/shared-types/src:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy   # Ensure migrations have run before workers start
    command: >
      sh -c "npx ts-node-dev --respawn --transpile-only -r tsconfig-paths/register src/worker.main.ts"

  # ── Web SPA ─────────────────────────────────────────────────────────────────
  web:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    environment:
      VITE_API_URL:       http://localhost:3000/v1
      VITE_AUTH_PROVIDER: ${AUTH_PROVIDER:-firebase}
      VITE_FIREBASE_API_KEY:            ${VITE_FIREBASE_API_KEY}
      VITE_FIREBASE_AUTH_DOMAIN:        ${VITE_FIREBASE_AUTH_DOMAIN}
      VITE_FIREBASE_PROJECT_ID:         ${FIREBASE_PROJECT_ID}
      VITE_AUTH0_DOMAIN:                ${AUTH0_DOMAIN}
      VITE_AUTH0_CLIENT_ID:             ${VITE_AUTH0_CLIENT_ID}
      VITE_AUTH0_AUDIENCE:              ${AUTH0_AUDIENCE}
      VITE_VAPID_PUBLIC_KEY:            ${VAPID_PUBLIC_KEY}
    ports:
      - '5173:5173'
    volumes:
      - ../apps/web:/app:cached
      - /app/node_modules           # Exclude node_modules from bind mount
    depends_on:
      - api
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  redis_data:
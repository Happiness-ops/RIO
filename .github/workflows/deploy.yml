name: Deploy

on:
  push:
    branches: [main]
  # Allow manual deploys from the Actions tab
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: production
        type: choice
        options: [production, staging]

concurrency:
  group:  deploy-${{ github.ref }}
  cancel-in-progress: false   # Never cancel a deploy in progress

env:
  NODE_VERSION:  '20'
  REGISTRY:      ghcr.io
  IMAGE_PREFIX:  ghcr.io/${{ github.repository_owner }}/rio-ai

jobs:
  # ── 1. Run CI checks first ───────────────────────────────────────────────────
  # Don't deploy if tests are failing.
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ── 2. Build & push Docker images ───────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: ci-gate
    permissions:
      contents: read
      packages: write

    outputs:
      api_image:     ${{ steps.meta-api.outputs.tags }}
      workers_image: ${{ steps.meta-workers.outputs.tags }}
      image_tag:     ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: |
          # e.g. "20260312-a1b2c3d" — date + short SHA for easy traceability
          TAG="${{ github.run_number }}-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── API image metadata ─────────────────────────────────────────────────
      - name: API image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/api
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── Workers image metadata ─────────────────────────────────────────────
      - name: Workers image metadata
        id: meta-workers
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/workers
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── Build & push API ───────────────────────────────────────────────────
      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context:     .
          file:        docker/api.Dockerfile
          push:        true
          tags:        ${{ steps.meta-api.outputs.tags }}
          labels:      ${{ steps.meta-api.outputs.labels }}
          cache-from:  type=gha
          cache-to:    type=gha,mode=max
          # Bake the git SHA into the image for debugging
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_NUMBER=${{ github.run_number }}

      # ── Build & push Workers ───────────────────────────────────────────────
      - name: Build & push Workers image
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       docker/workers.Dockerfile
          push:       true
          tags:       ${{ steps.meta-workers.outputs.tags }}
          labels:     ${{ steps.meta-workers.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_NUMBER=${{ github.run_number }}

  # ── 3. Run DB migrations ─────────────────────────────────────────────────────
  # Runs BEFORE deploying new containers so the schema is ready when the
  # new API version starts. Prisma migrate deploy is idempotent and safe.
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --workspace=apps/api

      - name: Run migrations
        run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma
        env:
          # DATABASE_URL is set as a GitHub Actions environment secret
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── 4. Deploy ────────────────────────────────────────────────────────────────
  # Update the running containers with the new image tags.
  # Currently wired for Railway — swap the deploy step for your host
  # (Render, Fly.io, AWS ECS, etc.) by replacing the "Deploy to Railway" step.
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url:  ${{ vars.APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Option A: Railway ──────────────────────────────────────────────────
      # Uncomment and set RAILWAY_TOKEN + service IDs in repository secrets.
      #
      # - name: Deploy API to Railway
      #   uses: railwayapp/railway-github-action@v1
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service:       ${{ secrets.RAILWAY_API_SERVICE_ID }}
      #     environment:   production
      #
      # - name: Deploy Workers to Railway
      #   uses: railwayapp/railway-github-action@v1
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service:       ${{ secrets.RAILWAY_WORKERS_SERVICE_ID }}
      #     environment:   production

      # ── Option B: Generic SSH deploy ──────────────────────────────────────
      # Pulls the new images on the production server via SSH.
      # Set DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY in repository secrets.
      #
      # - name: Deploy via SSH
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host:     ${{ secrets.DEPLOY_HOST }}
      #     username: ${{ secrets.DEPLOY_USER }}
      #     key:      ${{ secrets.DEPLOY_SSH_KEY }}
      #     script: |
      #       docker pull ${{ env.IMAGE_PREFIX }}/api:${{ needs.build-and-push.outputs.image_tag }}
      #       docker pull ${{ env.IMAGE_PREFIX }}/workers:${{ needs.build-and-push.outputs.image_tag }}
      #       docker compose -f /opt/rio-ai/docker-compose.prod.yml up -d --no-deps api workers

      # ── Placeholder — replace with your hosting provider ──────────────────
      - name: Confirm deploy target
        run: |
          echo "Images ready to deploy:"
          echo "  API:     ${{ env.IMAGE_PREFIX }}/api:${{ needs.build-and-push.outputs.image_tag }}"
          echo "  Workers: ${{ env.IMAGE_PREFIX }}/workers:${{ needs.build-and-push.outputs.image_tag }}"
          echo ""
          echo "ACTION REQUIRED: Uncomment the deploy step above for your hosting provider."

  # ── 5. Post-deploy smoke test ────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - name: Health check
        run: |
          echo "Hitting ${{ vars.APP_URL }}/v1/health ..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.APP_URL }}/v1/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i failed (HTTP $STATUS) — retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deploy smoke test failed — consider rolling back."
          # Add Slack/PagerDuty webhook here if needed:
          # curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
          #   -H 'Content-type: application/json' \
          #   --data '{"text":"🚨 RIO AI deploy smoke test FAILED for ${{ github.sha }}"}'